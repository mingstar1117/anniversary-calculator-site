<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기념일 계산기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hearts" aria-hidden="true">
      <span style="--left: 6%; --delay: 0s; --duration: 13s; --size: 14px"></span>
      <span style="--left: 14%; --delay: 1.2s; --duration: 12s; --size: 20px"></span>
      <span style="--left: 24%; --delay: 2.3s; --duration: 15s; --size: 16px"></span>
      <span style="--left: 32%; --delay: 0.8s; --duration: 11s; --size: 12px"></span>
      <span style="--left: 42%; --delay: 3s; --duration: 14s; --size: 18px"></span>
      <span style="--left: 50%; --delay: 1.8s; --duration: 10s; --size: 13px"></span>
      <span style="--left: 58%; --delay: 2.8s; --duration: 16s; --size: 22px"></span>
      <span style="--left: 66%; --delay: 0.6s; --duration: 12s; --size: 15px"></span>
      <span style="--left: 74%; --delay: 4s; --duration: 14s; --size: 17px"></span>
      <span style="--left: 82%; --delay: 1.5s; --duration: 11s; --size: 13px"></span>
      <span style="--left: 90%; --delay: 2.1s; --duration: 15s; --size: 19px"></span>
      <span style="--left: 96%; --delay: 3.2s; --duration: 13s; --size: 14px"></span>
    </div>

    <main class="app" aria-labelledby="title">
      <header class="hero">
        <p class="eyebrow">Anniversary Calculator</p>
        <h1 id="title">기념일 계산기</h1>
        <p class="subtitle">날짜를 입력하면 100일부터 1000일까지 100일 단위 기념일을 계산해드려요.</p>
      </header>

      <section class="panel" aria-label="날짜 입력">
        <form id="calc-form" class="form">
          <label for="start-date">기준 날짜</label>
          <div class="form-row">
            <input id="start-date" name="start-date" type="date" required />
            <button type="submit">계산하기</button>
          </div>
          <p id="hint" class="hint">예: 2026-03-04</p>
        </form>
      </section>

      <section class="panel" aria-live="polite" aria-label="계산 결과">
        <h2>결과</h2>
        <div id="result" class="result-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
